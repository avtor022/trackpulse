<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackPulse - Live Race Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="race-title">TrackPulse Live Race</h1>
            <div id="race-status">Status: <span id="status-value">Waiting</span></div>
            <div id="timer">Time: <span id="timer-value">00:00</span></div>
        </header>
        
        <main>
            <table id="leaderboard">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>No</th>
                        <th>Name</th>
                        <th>Model</th>
                        <th>Laps</th>
                        <th>Best Lap</th>
                        <th>Last Lap</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <!-- Leaderboard entries will be populated by JavaScript -->
                </tbody>
            </table>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
